name: $(MajorVersion).$(MinorVersion).$(date:yyMM).$(DayOfMonth)$(rev:rrr)

trigger:
  batch: true
  tags:
    include:
      - 'r*'
  branches:
    include:
      - dev/*
      - main
  
variables:
  buildConfiguration: 'Release'
  buildPlatform: 'any cpu'
  solutionFile: "Octo.Common.Services.sln"
  isRelease: $[startsWith(variables['Build.SourceBranch'], 'refs/tags/r')]
  MajorVersion: 0
  MinorVersion: 0

stages:
 - stage: Build
   jobs:
    - job: buildnuget
      displayName: "Build nuget and execute tests"
      pool:
        name: Gerald-Local-Linux
      steps:
      - checkout: self
        clean: true
        submodules: true
      - task: InstallSSHKey@0
        inputs:
          knownHostsEntry: '$(SSHKnownHosts)'
          sshPublicKey: '$(SSHPublicKey)'
          sshPassphrase: '$(SSHPassphrase)'
          sshKeySecureFile: '$(SSHPrivateKeyFile)'
      - template: setversion.yml
      - task: DotNetCoreCLI@2
        displayName: 'Build'
        inputs:
          command: 'build'
          projects:  $(SolutionFile)
          arguments: '--configuration $(BuildConfiguration)'
      - task: DotNetCoreCLI@2
        displayName: 'Test'
        inputs:
          command: 'test'
          projects: |
            '**/*Tests.csproj'
            !'**/*SystemTests.csproj'
          testRunTitle: 'CI'
      - task: PublishSymbols@2
        displayName: Publish symbols path
        continueOnError: True
        inputs:
          SearchPattern: '**\bin\**\*.pdb'
          PublishSymbols: false
          SymbolServerType: TeamServices
      - task: CopyFiles@2
        displayName: 'Copy Files from $(Build.SourcesDirectory)/bin/$(BuildConfiguration)/**/*.nupkg to $(build.artifactstagingdirectory)'
        inputs:
          SourceFolder: $(Build.SourcesDirectory)
          Contents: |
            bin/$(BuildConfiguration)/**/*.nupkg
          TargetFolder: $(build.artifactstagingdirectory)
      - task: PowerShell@2
        displayName: 'Create versioninfo file'
        inputs:
          targetType: 'inline'
          script: |
              New-Item $(build.artifactstagingdirectory)/versioninfo.txt
              Set-Content $(build.artifactstagingdirectory)/versioninfo.txt $(Build.BuildNumber)
      - task: PublishBuildArtifacts@1
        displayName: 'Publish Artifact: local'
        inputs:
          ArtifactName: local
      - task: DotNetCoreCLI@2
        displayName: Push Nuget Package
        inputs:
          command: custom
          custom: nuget
          arguments: >
             push $(Build.ArtifactStagingDirectory)/**/*.nupkg
             -s https://api.nuget.org/v3/index.json
             -k $(NuGetApiKey)           

