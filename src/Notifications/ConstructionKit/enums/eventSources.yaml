$schema: https://schemas.meshmakers.cloud/construction-kit-elements.schema.json
enums:
  - enumId: EventSources
    useFlags: false
    isExtensible: true
    description: "The source of an event is the entity that is responsible for the event."
    values:
      - key: 0
        name: Undefined
        description: "No source has been assigned to the event."
      - key: 1
        name: IdentityService
        description: "The event was generated by the Identity Service."
      - key: 2
        name: BotService
        description: "The event was generated by the Bot Service."
      - key: 3
        name: CommunicationService
        description: "The event was generated by the Communication Service."
      - key: 4
        name: AssetRepositoryService
        description: "The event was generated by the Asset Repository Service."
      - key: 5
        name: MeshAdapter
        description: "The event was generated by the Mesh Adapter."
      - key: 6
        name: AdminPanel
        description: "The event was generated by the Admin Panel."
