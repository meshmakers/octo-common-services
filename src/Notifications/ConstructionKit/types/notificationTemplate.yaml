"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
  - typeId: NotificationTemplate
    derivedFromCkTypeId: ${System}/Entity
    isFinal: false
    isAbstract: false
    attributes:
      - id: ${this}/SubjectTemplate
        name: SubjectTemplate
      - id: ${this}/BodyTemplate
        isOptional: true
        name: BodyTemplate
      - id: ${this}/NotificationType
        name: Type
      - id: ${this}/RenderingType
        name: RenderingType

