"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
  - typeId: Event
    derivedFromCkTypeId: ${System}/Entity
    isFinal: false
    isAbstract: false
    attributes:
      - id: ${thisModel}/Message
        name: Message
        isOptional: true
      - id: ${thisModel}/EventLevel
        name: Level
      - id: ${thisModel}/EventSource
        name: Source
