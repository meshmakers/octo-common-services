"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
attributes:
  - id: Message
    description: The message of the event
    valueType: String
  - id: EventLevel
    description: Defines the level of the event (Information, Warning, Error)
    valueType: Enum
    valueCkEnumId: ${thisModel}/EventLevels
  - id: EventState
    description: Defines the state of the event (Active, Inactive)
    valueType: Enum
    valueCkEnumId: ${thisModel}/EventStates
  - id: EventSource
    description: Defines event sources
    valueType: Enum
    valueCkEnumId: ${thisModel}/EventSources    

