"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
attributes:
  - id: SubjectText
    description: The subject text of the notification
    valueType: String 
  - id: BodyText
    description: The body text of the notification
    valueType: String
  - id: BodyTemplate
    description: The body of the event as a template
    valueType: String
  - id: SubjectTemplate
    description: The subject of the event as a template
    valueType: String
  - id: NotificationType
    description: Defines the type of the notification (Email, SMS, Push)
    valueType: Enum
    valueCkEnumId: ${this}/NotificationTypes
  - id: RenderingType
    description: Defines the rendering type of the notification (Text, Html)
    valueType: Enum
    valueCkEnumId: ${this}/RenderingTypes    

