# Root-level CI pipeline using shared templates from octo-pipeline-templates.
#
# Phase 1 pilot 5 of the YAML migration (see octo-mesh-deployment's
# docs/pipeline-architecture-concept.md). Last of the 5 base libs. With
# this merged + green, the libraries tier is fully on YAML and the Phase 2
# release-libs-train.yml orchestrator becomes feasible.
#
# Uses tpl-v0.2.1 — the patch that exports OctoPublishCatalog from
# update-build-number.yml. Common-Services consumes that variable through
# the effectivePublishCatalog conditional below.

name: $(MajorVersion).$(MinorVersion).$(date:yyMM).$(DayOfMonth)$(rev:rrr)-$(Build.SourceBranchName)

parameters:
  # Injected by the release train on r-tag builds so the whole chain pins the
  # scheduler-determined lib/comm release version (forwarded to
  # update-build-number.yml). Default 'auto' = no override (version computed
  # normally); the train injects the real version on r-tag.
  - name: octoCoreLibVersion
    type: string
    default: 'auto'
  - name: octoCommVersion
    type: string
    default: 'auto'

resources:
  pipelines:
    - pipeline: octo-sdk
      source: octo-sdk-CI
      trigger:
        branches:
          include:
            - main
    - pipeline: octo-construction-kit
      source: octo-construction-kit-engine-mongodb-CI
      trigger:
        branches:
          include:
            - main
  repositories:
    - repository: pipelineTemplates
      type: github
      name: meshmakers/octo-pipeline-templates
      endpoint: meshmakers-access-token
      ref: refs/tags/tpl-v0.5.1

trigger:
  batch: true
  branches:
    include:
      - dev/*
      - test/*
      - main
  tags:
    exclude:
      - '*'

variables:
  - group: ApiKeys-mm-cloud
  - group: OctoDefault
  - name: solutionFile
    value: 'Octo.Common.Services.sln'
  - name: artifactsFrameworkVersion
    value: 'net10.0'
  - name: buildConfiguration
    value: 'Release'
  - name: buildPlatform
    value: 'Any CPU'
  - name: isRelease
    value: ${{ startsWith(variables['Build.SourceBranch'], 'refs/tags/r') }}
  - name: isMain
    value: ${{ eq(variables['Build.SourceBranch'], 'refs/heads/main') }}
  - name: isTest
    value: ${{ startsWith(variables['Build.SourceBranch'], 'refs/heads/test') }}
  # CK publish routing (effectivePublishCatalog: GitHub catalogs only on main/r* tags,
  # incident: Industry.Basic-2.1.1) and the per-run local catalog root
  # (OctoLocalCatalogRootPath -> Agent.TempDirectory, AB#4167) are exported as runtime
  # variables by the shared update-build-number.yml template (tpl-v0.3.1). The
  # run-isolated catalog is writable, so feature branches publish CK models again.

stages:
  - stage: Build
    jobs:
      - job: buildnuget
        displayName: 'Build nuget and execute tests'
        pool:
          name: meshmakers-ci-agents
        steps:
          - template: templates/steps/update-build-number.yml@pipelineTemplates
            parameters:
              octoCoreLibVersionOverride: ${{ replace(parameters.octoCoreLibVersion, 'auto', '') }}
              octoCommVersionOverride: ${{ replace(parameters.octoCommVersion, 'auto', '') }}
          - checkout: self
            clean: true
            submodules: true
          - task: InstallSSHKey@0
            inputs:
              knownHostsEntry: '$(SSHKnownHosts)'
              sshPublicKey: '$(SSHPublicKey)'
              sshPassphrase: '$(SSHPassphrase)'
              sshKeySecureFile: '$(SSHPrivateKeyFile)'
          - template: templates/steps/set-version.yml@pipelineTemplates
          # CK SemVer honesty gate (AB#4420): System.Notification is published
          # DURING the dotnet build (/p:OctoPublishCatalog), so the gate must
          # be able to fail first.
          - template: templates/steps/validate-ck-versions.yml@pipelineTemplates
            parameters:
              constructionKitPaths:
                - 'src/Notifications/ConstructionKit'
          - task: DotNetCoreCLI@2
            retryCountOnTaskFailure: 2
            displayName: 'Restore NuGet packages'
            inputs:
              command: 'restore'
              projects: '$(SolutionFile)'
              restoreArguments: '--force /p:OctoNugetPrivateServer=$(nugetPrivateServer)'
              noCache: true
          - task: DotNetCoreCLI@2
            retryCountOnTaskFailure: 2
            displayName: 'Build'
            inputs:
              command: 'build'
              projects: $(SolutionFile)
              arguments: '--configuration $(BuildConfiguration) /p:OctoNugetPrivateServer=$(nugetPrivateServer) /p:OctoPublishCatalog="$(effectivePublishCatalog)" /p:OctoPrivateGitHubApiKey=$(GitHubPAT) /p:OctoPublicGitHubApiKey=$(GitHubPAT)'
          - task: DotNetCoreCLI@2
            retryCountOnTaskFailure: 2
            displayName: 'Test'
            inputs:
              command: 'test'
              arguments: '--configuration $(buildConfiguration) /p:OctoNugetPrivateServer=$(nugetPrivateServer)'
              projects: |
                **/*Tests.csproj
                !**/*SystemTests.csproj
              testRunTitle: 'CI'
          - template: templates/steps/handle-artifacts.yml@pipelineTemplates
            parameters:
              constructionKitLibraryPaths:
                - 'bin/$(buildConfiguration)/$(artifactsFrameworkVersion)/octo-ck-libraries/Notifications'
          - template: templates/steps/push-nuget-package.yml@pipelineTemplates
